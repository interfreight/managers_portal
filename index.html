<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

body{
background:#f4f7fb;

/* SIDEBAR */

.sidebar{

180deg,
#00264d,

repeat(auto-fit,minmax(220px,1fr));

0 10px 30px rgba(0,0,0,.08);

5px solid #F4C542;

}

padding:25px;

0 10px 30px rgba(0,0,0,.08);

.hero-right h2{

}

.request-left{

}

.request-name{

margin-bottom:10px;

.request-grid{
display:grid;
grid-template-columns:repeat(2,minmax(200px,1fr));

}

.request-grid div{

color:#555;
}

.request-label{
font-weight:600;
color:#003366;
}

.request-right{
text-align:right;
min-width:180px;
}

.status-badge{
display:inline-block;
padding:8px 14px;
border-radius:30px;
font-weight:bold;
margin-bottom:15px;
}

.pending{
background:#fff3cd;
color:#856404;
}

.approved{
background:#d4edda;
color:#155724;
}

.rejected{
background:#f8d7da;
color:#721c24;
}
.request-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}
/* STATUS */

.pending{
color:#f0ad4e;
font-weight:bold;
}

.approved{
color:#28a745;
font-weight:bold;
}

.rejected{
color:#dc3545;
font-weight:bold;
}

/* BUTTONS */
.request{
background:white;
border-radius:20px;
padding:22px;
border:1px solid #e5e7eb;
box-shadow:0 4px 15px rgba(0,0,0,.05);
margin-bottom:15px;
}

.request-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.request-name{
font-size:20px;
font-weight:700;
color:#003366;
}

.request-subtitle{
font-size:14px;
color:#666;
margin-top:4px;
}

.request-grid{
display:grid;
grid-template-columns:repeat(2,1fr);

}

.request-grid div{

}

.request-label{
display:block;
font-size:12px;
text-transform:uppercase;
color:#888;
margin-bottom:5px;

}

.reason-box{
grid-column:1 / -1;
}

.reason-box p{
margin-top:5px;
line-height:1.5;

}

.request-actions{
display:flex;
justify-content:flex-end;
gap:10px;
}

.status-badge{
padding:8px 16px;
border-radius:30px;
font-size:13px;
font-weight:700;
}
.btn{
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
margin-top:10px;
}
.header{
background:white;

#leaveQueue{

.btn-approve{

.logout-btn{

.hero-banner{

background:
linear-gradient(
135deg,
#003366,
#004b99
);

border-radius:25px;

padding:25px 35px;

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:25px;

0 15px 40px rgba(0,51,102,.25);

.hero-left{

}

.hero-logo{

height:90px;

.content-grid{

<body>

<div class="main">


<div class="hero-banner">

<!-- DASHBOARD CARDS -->

</div>

<div class="content-grid">

<script>
    async function submitLeave(){

const leaveType =
document.getElementById("leaveType").value;

const dateFrom =
document.getElementById("dateFrom").value;

const dateTo =
document.getElementById("dateTo").value;

const reason =
document.getElementById("reason").value;

if(
!leaveType ||
!dateFrom ||
!dateTo
){
alert("Please complete all fields.");
return;
}

const from =
new Date(dateFrom);

const to =
new Date(dateTo);

const totalDays =
Math.floor(
(to - from) /
(1000*60*60*24)
) + 1;

const { data: profile } =
await db
.from("employee_profiles")
.select("*")
.eq("user_id", currentUser.id)
.single();

const { error } =
await db
.from("employee_leaves")
.insert([{

user_id:
currentUser.id,

employee_name:
currentUser.full_name,

department:
currentUser.department,

leave_type:
leaveType,

date_from:
dateFrom,

date_to:
dateTo,

total_days:
totalDays,

reason:
reason,

status:"Pending",

approved_by:null,

deducted:false

}]);

if(error){

alert(error.message);
return;

}

alert("Leave request submitted successfully.");

window.location.href =
"https://interfreight.github.io/manager_my_leave_history/";
}

}
   
    
    const db = window.supabase.createClient(
"https://tuihpvykuqbqnfyfepql.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aWhwdnlrdXFicW5meWZlcHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjg4OTcsImV4cCI6MjA5NzMwNDg5N30.HZKS8CgFLjkZ-Bx2AIjFjurH3IsKjvf37Ft852CzJsQ"
);
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

/* DETERMINE MANAGER DEPARTMENT */

function getManagerDepartment(){

const role = currentUser.role.toUpperCase();

switch(role){

case "TRANSPORT MANAGER":
    return "Transport";

case "OPERATIONS MANAGER":
    return "Operations";

case "SALES MANAGER":
    return "Sales";

case "ACCOUNTING MANAGER":
    return "Accounting";

case "FORWARDING MANAGER":
    return "Forwarding";

case "HR":
    return "ALL";

default:
    return null;

}

}

async function loadDashboard(){

await loadStats();

await loadLeaveQueue();

}

/* LOAD STATS */

async function loadStats(){

let query =
db
.from("employee_leaves")
.select("*");

const managerDept =
getManagerDepartment();

if(managerDept !== "ALL"){

query =
query.eq(
"department",
managerDept
);

}

const { data } =
await query;

if(!data) return;

document.getElementById("totalCount").textContent =
data.length;

document.getElementById("pendingCount").textContent =
data.filter(
x=>x.status==="Pending"
).length;

document.getElementById("approvedCount").textContent =
data.filter(
x=>x.status==="Approved"
).length;

document.getElementById("rejectedCount").textContent =
data.filter(
x=>x.status==="Rejected"
).length;

}

/* LOAD LEAVE QUEUE */

async function loadLeaveQueue(){

const container =
document.getElementById("leaveQueue");

container.innerHTML =
"Loading...";

let query =
db
.from("employee_leaves")
.select("*")
.order(
"created_at",
{
ascending:false
}
);

const managerDept =
getManagerDepartment();

if(managerDept !== "ALL"){

query =
query.eq(
"department",
managerDept
);

}

const { data, error } =
await query;

if(error){

container.innerHTML =
error.message;

return;

}

if(data.length===0){

container.innerHTML =
"No leave requests found.";

return;

}

container.innerHTML = "";

data.forEach(leave=>{

let buttons = "";

if(leave.status==="Pending"){

buttons = `

<button
class="btn btn-approve"
onclick="approveLeave(${leave.id})">

Approve

</button>

<button
class="btn btn-reject"
onclick="rejectLeave(${leave.id})">

Reject

</button>

`;

}

container.innerHTML += `

<div class="request">

    <div class="request-header">

        <div>

            <div class="request-name">
                ${leave.employee_name}
            </div>

            <div class="request-subtitle">
                ${leave.department} • ${leave.leave_type}
            </div>

        </div>

        <span class="status-badge ${leave.status.toLowerCase()}">
            ${leave.status}
        </span>

    </div>

    <div class="request-grid">

        <div>
            <span class="request-label">Date From</span>
            <strong>${leave.date_from}</strong>
        </div>

        <div>
            <span class="request-label">Date To</span>
            <strong>${leave.date_to}</strong>
        </div>

        <div>
            <span class="request-label">Total Days</span>
            <strong>${leave.total_days}</strong>
        </div>

        <div>
            <span class="request-label">Approved By</span>
            <strong>${leave.approved_by || "Pending"}</strong>
        </div>

        <div class="reason-box">
            <span class="request-label">Reason</span>
            <p>${leave.reason}</p>
        </div>

    </div>

    <div class="request-actions">

        ${buttons}

    </div>

</div>

`;
}); // closes data.forEach

} // closes loadLeaveQueue
/* APPROVE */

async function approveLeave(id){

if(
!confirm(
"Approve this leave?"
)
){
return;
}

const { data: leave } =
await db
.from("employee_leaves")
.select("*")
.eq("id", id)
.single();

if(!leave) return;

await db
.from("employee_leaves")
.update({

status:"Approved",

approved_by:
currentUser.full_name,

approved_date:
new Date().toISOString()

})
.eq("id",id);

/* DEDUCT LEAVE ONCE */

if(!leave.deducted){

const { data: profile } =
await db
.from("employee_profiles")
.select("*")
.eq(
"user_id",
leave.user_id
)
.single();

let field = "";

switch(leave.leave_type){

case "Vacation Leave":
field = "vacation_leave";
break;

case "Sick Leave":
field = "sick_leave";
break;

case "Emergency Leave":
field = "emergency_leave";
break;

case "Birthday Leave":
field = "birthday_leave";
break;

case "Maternity Leave":
field = "maternity_leave";
break;

case "Paternity Leave":
field = "paternity_leave";
break;

case "Study Leave":
field = "study_leave";
break;

}

if(field){

const current =
profile[field] || 0;

const remaining =
Math.max(
0,
current - leave.total_days
);

await db
.from("employee_profiles")
.update({

[field]: remaining

})
.eq(
"user_id",
leave.user_id
);

}

await db
.from("employee_leaves")
.update({

deducted:true

})
.eq("id",id);

}
}

/* REJECT */

async function rejectLeave(id){

if(
!confirm(
"Reject this leave?"
)
){
return;
}

await db
.from("employee_leaves")
.update({

status:"Rejected",

approved_by:
currentUser.full_name,

approved_date:
new Date().toISOString()

})
.eq("id",id);

loadManagerProfile();
loadDashboard();

}
loadManagerProfile();
loadDashboard();
</script>
